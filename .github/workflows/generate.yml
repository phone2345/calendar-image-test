name: Generate Calendar Images

on:

  schedule:
    - cron: "*/30 * * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Generate images
      run: |
        python scripts/generate.py

    - name: Commit images
      run: |

        git config user.name github-actions
        git config user.email actions@github.com

        git add output/*.png

        git commit -m "update schedule images" || echo "no changes"

        git push
